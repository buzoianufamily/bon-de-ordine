name: Build Android APK

# Construieste APK-ul launcher-ului si il pune ca artifact descarcabil.
# Ruleaza manual din tab-ul Actions (Run workflow) sau automat la modificari in android/launcher.

on:
  workflow_dispatch:
  push:
    paths:
      - 'android/launcher/**'
      - '.github/workflows/android.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android/launcher
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.7'

      - name: Build debug APK
        run: gradle assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: bon-de-ordine-launcher-apk
          path: android/launcher/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
